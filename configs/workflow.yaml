project_name: "convertible_bond_events"
paths:
  metadata: "data/metadata/metadata.csv"
  pdf_dir: "data/pdf"
  parsed_dir: "data/parsed"
  section_report: "outputs/reports/section_check_report.csv"
  results_jsonl: "outputs/results/extract_results.jsonl"
  validated_csv: "outputs/results/records_validated.csv"
  run_log: "outputs/logs/run_log.jsonl"
  event_timeline: "outputs/results/event_timeline.csv"
  metrics_report: "outputs/reports/metrics_report.csv"

steps:
  audit:
    enabled: true
  parse:
    enabled: true
    limit: 50
  route_sections:
    enabled: true
    rules: "configs/section_rules.yaml"
  extract:
    enabled: true
    prompt: "prompts/prompt_bond_extraction.md"
  validate:
    enabled: true
  match_events:
    enabled: true
  calculate_metrics:
    enabled: true
  report:
    enabled: true